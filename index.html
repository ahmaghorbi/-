<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>رنگین کادو | فروشگاه اکسسوری</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:#fff7fb;
}

header{
background:#ff4f8b;
color:white;
padding:20px;
text-align:center;
}

nav{
margin-top:15px;
}

nav a{
color:white;
text-decoration:none;
margin:15px;
font-size:18px;
}

.hero{
padding:80px 20px;
text-align:center;
}

.hero h1{
font-size:40px;
color:#ff4f8b;
}

.hero p{
margin-top:15px;
font-size:20px;
color:#555;
}

.btn{
margin-top:30px;
background:#ff4f8b;
color:white;
padding:15px 35px;
border:none;
border-radius:30px;
font-size:18px;
}

.products{

display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
padding:40px;

}

.card{

background:white;
width:250px;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.15);
text-align:center;

}

.card img{

width:100%;
border-radius:10px;

}

.card h2{

margin:15px 0;

}

.price{

color:#ff4f8b;
font-size:22px;

}

footer{

background:#ff4f8b;
color:white;
text-align:center;
padding:20px;
margin-top:50px;

}

</style>

</head>

<body>

<header>

<h1>🎁 رنگین کادو</h1>

<nav>

<a href="#">خانه</a>

<a href="#">محصولات</a>

<a href="#">درباره ما</a>

<a href="#">تماس با ما</a>

</nav>

</header>

<section class="hero">

<h1>به فروشگاه رنگین کادو خوش آمدید</h1>

<p>فروش انواع اکسسوری زنانه، بچگانه و هدیه</p>

<button class="btn">مشاهده محصولات</button>

</section>

<section class="products">

<div class="card">

<img src="https://picsum.photos/250/250?1">

<h2>کلیپس زنانه</h2>

<p class="price">۱۵۰,۰۰۰ تومان</p>

</div>

<div class="card">

<img src="https://picsum.photos/250/250?2">

<h2>اسکرانچی</h2>

<p class="price">۹۰,۰۰۰ تومان</p>

</div>

<div class="card">

<img src="https://picsum.photos/250/250?3">

<h2>کش مو</h2>

<p class="price">۶۵,۰۰۰ تومان</p>

</div>

</section>

<footer>

تمامی حقوق برای فروشگاه رنگین کادو محفوظ است.

</footer>

</body>

</html>
